services:
  postgres:
    image: postgres:16-alpine
    container_name: pflegecommons-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pflege
      POSTGRES_PASSWORD: pflege_dev
      POSTGRES_DB: pflegecommons
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
